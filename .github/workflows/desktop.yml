name: Desktop CI

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run ktlint
        run: ./gradlew ktlintCheck

      - name: Run Detekt
        run: ./gradlew detekt

      - name: Run Tests
        run: ./gradlew check --stacktrace

      - name: Package Uber-JAR
        run: ./gradlew :composeApp:packageUberJar --stacktrace

      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-application
          path: composeApp/build/libs/*.jar
